generations:
  - name: "First Generation"
    start_year: 2021
    end_year: 2023
    description: "The Cupra Born is the first all-electric vehicle from SEAT's performance-oriented Cupra sub-brand. Built on Volkswagen Group's MEB platform shared with the VW ID.3, it features distinctive, aggressive styling that sets it apart from its Volkswagen cousin. The exterior showcases Cupra's design language with sharp lines, copper accents, and sportier details including a more pronounced front splitter and diffuser. The official premiere took place in May 2021, with production starting in September 2021. At launch there were two powertrains: a base 110 kW rear motor and a more powerful 150 kW / 204 hp model with 310 Nm torque, the latter enabling 0-100 km/h acceleration in 6.6 seconds. Battery options included 45 kWh, 55 kWh, and 77 kWh configurations with ranges from 340 to 540 kilometers on the WLTP cycle. Charging on a fast charger to 80% takes 35-60 minutes depending on battery size. The interior features a 12-inch infotainment touchscreen, sports seats with integrated headrests, a head-up display, and adaptive cruise control with Travel Assist system for semi-autonomous driving. Dynamic Chassis Control Sport suspension and traffic sign recognition are standard. The Born represents Cupra's vision for performance-oriented electric mobility, offering a more emotionally engaging alternative to mainstream EVs."
  - name: "First Generation (2024 Facelift)"
    start_year: 2024
    end_year: null
    description: "In 2024, the Cupra Born received a significant facelift. The more powerful VZ variant was introduced with a 240 kW / 326 hp motor and 545 Nm torque, achieving 0-100 km/h in 5.6 seconds. New powertrain options include the 59 kWh Born with E-Boost Pack and the 77 kWh with E-Boost Pack, replacing earlier configurations. The Born 45 was cancelled. The 77 kWh and 77 kWh E-Boost Pack variants continue with 170 kW output. Charging was upgraded with the E-Boost Pack versions supporting higher power DC charging up to 165-175 kW. The facelift brought visual and technical refreshes that maintain the Cupra design language while improving performance and efficiency. The Born continues as Cupra's flagship electric hatchback, manufactured in Zwickau, Germany on the MEB platform."
